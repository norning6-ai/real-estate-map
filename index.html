<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 300px; background: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h1 { font-size: 24px; margin-bottom: 20px; color: #333; }
        .project-item { padding: 10px; margin: 10px 0; background: #f5f5f5; border-left: 4px solid #FF6B6B; cursor: pointer; }
        .project-item:hover { background: #e8e8e8; }
        #map { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>🏠 Real Estate</h1>
            <div id="projectsList">
                <div class="project-item">Project 1 - Senanikom</div>
                <div class="project-item">Project 2 - Chantrakasem</div>
                <div class="project-item">Project 3 - Jarekai</div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const map = L.map('map').setView([13.7563, 100.5018], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        const projects = [
            { name: 'Project 1', lat: 13.7563, lon: 100.5018 },
            { name: 'Project 2', lat: 13.7500, lon: 100.4950 },
            { name: 'Project 3', lat: 13.7600, lon: 100.5100 }
        ];

        projects.forEach(p => {
            L.marker([p.lat, p.lon]).addTo(map)
                .bindPopup(`<b>${p.name}</b>`);
        });
    </script>
</body>
</html>
