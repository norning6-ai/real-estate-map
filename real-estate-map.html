<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkok Real Estate Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            padding: 20px;
            z-index: 100;
        }

        .sidebar h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #FF6B6B;
            padding-bottom: 10px;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section h3 {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-option {
            display: flex;
            align-items: center;
        }

        .filter-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 10px;
        }

        .filter-option label {
            cursor: pointer;
            font-size: 14px;
            color: #555;
            flex: 1;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-filter {
            background: #FF6B6B;
            color: white;
        }

        .btn-filter:hover {
            background: #E55555;
        }

        .projects-list {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .projects-list h3 {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .project-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-left: 3px solid #FF6B6B;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .project-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .project-item-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .project-item-zone {
            font-size: 12px;
            color: #999;
        }

        #map {
            flex: 1;
            background: #e5e3df;
        }

        .popup-content {
            min-width: 280px;
        }

        .popup-header {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            border-bottom: 2px solid #FF6B6B;
            padding-bottom: 8px;
        }

        .popup-info {
            font-size: 13px;
            color: #666;
            margin: 6px 0;
            line-height: 1.4;
        }

        .popup-links {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        .popup-links a {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: #FF6B6B;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 40vh;
            }
            #map {
                min-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>🏠 Real Estate</h1>

            <input type="text" id="searchBox" class="search-box" placeholder="ค้นหาโครงการ...">

            <div class="filter-section">
                <h3>โซน (Zone)</h3>
                <div class="filter-group" id="zoneFilters"></div>
            </div>

            <div class="filter-section">
                <h3>ประเภท (Type)</h3>
                <div class="filter-group" id="typeFilters"></div>
            </div>

            <div class="button-group">
                <button class="btn btn-filter" onclick="applyFilters()">🔍 ค้นหา</button>
                <button class="btn btn-reset" onclick="resetFilters()">↺ รีเซ็ต</button>
            </div>

            <div class="projects-list">
                <h3>โครงการ (Projects)</h3>
                <div id="projectsList"></div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        const ZONE_COLORS = {
            'เสนานิคม': { color: '#FFF9C4', borderColor: '#FBC02D' },
            'จันทรเกษม': { color: '#FFCDD2', borderColor: '#E53935' },
            'จรเข้บัว': { color: '#BBDEFB', borderColor: '#1976D2' },
            'ลาดพร้าว': { color: '#D7CCC8', borderColor: '#6D4C41' }
        };

        let map, markerClusterGroup;
        let allProjects = [];
        let filteredProjects = [];
        let markers = {};

        function initMap() {
            map = L.map('map').setView([13.7563, 100.5018], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            markerClusterGroup = L.markerClusterGroup({ maxClusterRadius: 80 });
            map.addLayer(markerClusterGroup);
        }

        async function loadCSVData() {
            try {
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQkOdRULyIfGZRazPhqFn4vQvsCBuxOC1SAEwwiiecwQ_GbFx8_aTCeWa8EqZLPphRGHOnClatbqeKt/pub?output=csv&t=' + Date.now();
const proxyUrl = 'https://cors-anywhere.herokuapp.com/' + csvUrl;
const response = await fetch(proxyUrl);
                parseCSV(csvText);
                populateFilters();
                displayAllProjects();
                updateMap();
            } catch (error) {
                console.error('Error loading CSV:', error);
document.getElementById('projectsList').innerHTML = '<div class="loading">⚠️ ไม่สามารถโหลดข้อมูลได้: ' + error.message + '</div>';
            }
        }

        function parseCSV(csvText) {
const lines = csvText.trim().split('\n');
const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            const projectIdx = headers.indexOf('Project');
            const zoneIdx = headers.indexOf('Zone');
            const typeIdx = headers.indexOf('Type');
            const minPriceIdx = headers.indexOf('Min Price');
            const maxPriceIdx = headers.indexOf('Max Price');
            const unitsIdx = headers.indexOf('Units');
            const yearBuiltIdx = headers.indexOf('Year Built');
            const soiIdx = headers.indexOf('Soi');
            const roadAccessIdx = headers.indexOf('Road Access');
            const mrtBtsIdx = headers.indexOf('MRT / BTS');
            const developerIdx = headers.indexOf('Developer');
            const googleMapIdx = headers.indexOf('Google Man');
            const latIdx = headers.indexOf('Latitude');
            const lonIdx = headers.indexOf('Longitude');

            allProjects = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                
                const values = lines[i].split(',').map(v => v.trim());
                
                if (values[latIdx] && values[lonIdx]) {
                    allProjects.push({
                        name: values[projectIdx] || 'Unknown',
                        zone: values[zoneIdx] || 'Unknown',
                        type: values[typeIdx] || 'Unknown',
                        minPrice: parseFloat(values[minPriceIdx]) || 0,
                        maxPrice: parseFloat(values[maxPriceIdx]) || 0,
                        units: values[unitsIdx] || '-',
                        yearBuilt: values[yearBuiltIdx] || '-',
                        soi: values[soiIdx] || '-',
                        roadAccess: values[roadAccessIdx] || '-',
                        mrtBts: values[mrtBtsIdx] || '-',
                        developer: values[developerIdx] || '-',
                        googleMapLink: values[googleMapIdx] || '#',
                        lat: parseFloat(values[latIdx]),
                        lon: parseFloat(values[lonIdx])
                    });
                }
            }
            
            console.log(`Loaded ${allProjects.length} projects`);
        }

        function populateFilters() {
            const zones = [...new Set(allProjects.map(p => p.zone))];
            const zoneHtml = zones.map(zone => `
                <div class="filter-option">
                    <input type="checkbox" id="zone_${zone}" value="${zone}" class="zone-check">
                    <label for="zone_${zone}">${zone}</label>
                </div>
            `).join('');
            document.getElementById('zoneFilters').innerHTML = zoneHtml;

            const types = [...new Set(allProjects.map(p => p.type))];
            const typeHtml = types.map(type => `
                <div class="filter-option">
                    <input type="checkbox" id="type_${type}" value="${type}" class="type-check">
                    <label for="type_${type}">${type}</label>
                </div>
            `).join('');
            document.getElementById('typeFilters').innerHTML = typeHtml;
        }

        function applyFilters() {
            const selectedZones = Array.from(document.querySelectorAll('.zone-check:checked')).map(el => el.value);
            const selectedTypes = Array.from(document.querySelectorAll('.type-check:checked')).map(el => el.value);
            const searchText = document.getElementById('searchBox').value.toLowerCase();

            filteredProjects = allProjects.filter(project => {
                const matchZone = selectedZones.length === 0 || selectedZones.includes(project.zone);
                const matchType = selectedTypes.length === 0 || selectedTypes.includes(project.type);
                const matchSearch = searchText === '' || project.name.toLowerCase().includes(searchText);

                return matchZone && matchType && matchSearch;
            });

            updateMap();
            displayFilteredProjects();
        }

        function resetFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
            document.getElementById('searchBox').value = '';
            filteredProjects = allProjects;
            updateMap();
            displayAllProjects();
        }

        function updateMap() {
            markerClusterGroup.clearLayers();
            markers = {};

            filteredProjects.forEach((project, index) => {
                const zoneColor = ZONE_COLORS[project.zone] || { color: '#E0E0E0', borderColor: '#999' };
                
                const markerHtml = `
                    <div style="
                        background-color: ${zoneColor.color};
                        border: 2px solid ${zoneColor.borderColor};
                        border-radius: 50%;
                        width: 32px;
                        height: 32px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 16px;
                        cursor: pointer;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                    ">🏠</div>
                `;

                const icon = L.divIcon({
                    html: markerHtml,
                    iconSize: [32, 32],
                    popupAnchor: [0, -16],
                    className: 'custom-marker'
                });

                const marker = L.marker([project.lat, project.lon], { icon })
                    .bindPopup(createPopupContent(project), { maxWidth: 300 });

                markerClusterGroup.addLayer(marker);
                markers[index] = marker;
            });
        }

        function createPopupContent(project) {
            return `
                <div class="popup-content">
                    <div class="popup-header">${project.name}</div>
                    <div class="popup-info"><strong>โซน:</strong> ${project.zone}</div>
                    <div class="popup-info"><strong>ประเภท:</strong> ${project.type}</div>
                    <div class="popup-info"><strong>ราคา:</strong> ${project.minPrice} - ${project.maxPrice} ล้าน</div>
                    <div class="popup-info"><strong>หน่วย:</strong> ${project.units}</div>
                    <div class="popup-info"><strong>ถนน:</strong> ${project.roadAccess}</div>
                    <div class="popup-info"><strong>BTS/MRT:</strong> ${project.mrtBts}</div>
                    <div class="popup-links">
                        <a href="${project.googleMapLink}" target="_blank">📍 Google Map</a>
                    </div>
                </div>
            `;
        }

        function displayAllProjects() {
            filteredProjects = allProjects;
            displayFilteredProjects();
        }

        function displayFilteredProjects() {
            const html = filteredProjects.length > 0
                ? filteredProjects.map(p => `
                    <div class="project-item" onclick="focusOnProject('${p.name}')">
                        <div class="project-item-name">${p.name}</div>
                        <div class="project-item-zone">${p.zone} • ${p.type}</div>
                        <div class="project-item-zone">${p.minPrice} - ${p.maxPrice} ล้าน</div>
                    </div>
                `).join('')
                : '<div class="loading">ไม่พบโครงการ</div>';

            document.getElementById('projectsList').innerHTML = html;
        }

        function focusOnProject(name) {
            const project = allProjects.find(p => p.name === name);
            if (project) {
                map.setView([project.lat, project.lon], 16);
            }
        }

        document.getElementById('searchBox').addEventListener('input', applyFilters);

        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            loadCSVData();
        });
    </script>
</body>
</html>
